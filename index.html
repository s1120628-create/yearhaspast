<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今年進度追蹤器</title>
    <style>
        /* 基礎樣式設計：採用深色現代感風格 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 85%;
            max-width: 500px;
        }

        h1 {
            font-size: 20px;
            color: #8b949e;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* 進度條外框 */
        .progress-container {
            background-color: #21262d;
            border-radius: 20px;
            height: 24px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #30363d;
        }

        /* 進度條本體 */
        .progress-bar {
            background: linear-gradient(90deg, #2ea44f, #238636);
            height: 100%;
            width: 0%;
            transition: width 0.25s linear; /* 讓進度條移動時更平滑 */
        }

        /* 百分比數字：使用等寬字型（Monospace）防止數字跳動時畫面閃爍 */
        .percentage {
            font-size: 36px;
            font-weight: bold;
            color: #58a6ff;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="year-title">今年已過去</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="percentage" id="percentage-text">0.00000000%</div>
    </div>

    <script>
        function calculateYearProgress() {
            const now = new Date();
            const currentYear = now.getFullYear();

            // 1. 取得今年的起點與終點時間戳記（毫秒）
            const startOfYear = new Date(currentYear, 0, 1).getTime(); // 1月1日 00:00:00
            const endOfYear = new Date(currentYear + 1, 0, 1).getTime(); // 明年1月1日 00:00:00
            const currentTime = now.getTime();

            // 2. 計算總毫秒數與已過去的毫秒數
            const totalMsInYear = endOfYear - startOfYear;
            const elapsedMsInYear = currentTime - startOfYear;

            // 3. 計算百分比
            const progressPercentage = (elapsedMsInYear / totalMsInYear) * 100;

            // 4. 更新畫面內容
            // 因為每 0.25 秒更新一次，顯示到小數點後 8 位可以完美展現毫秒級的動態跳動
            document.getElementById('year-title').innerText = `${currentYear} 年已過去`;
            document.getElementById('percentage-text').innerText = progressPercentage.toFixed(8) + '%';
            document.getElementById('progress-bar').style.width = progressPercentage + '%';
        }

        // 網頁載入時先執行一次，避免 0.25 秒的空白延遲
        calculateYearProgress();

        // 每 250 毫秒（0.25秒）自動執行一次
        setInterval(calculateYearProgress, 250);
    </script>

</body>
</html>
